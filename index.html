<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tienda Libre</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-light">
  
  <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm" style="z-index: 1030;">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="#">Inicio</a>

      <div class="d-flex align-items-center order-lg-last">
        <button class="btn btn-primary position-relative me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-controls="cartOffcanvas">
          <i class="bi bi-cart3"></i>
          <span class="badge-floating" id="cart-badge" style="pointer-events: none;">0</span>
        </button>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
      
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0"></ul>
        <form class="d-flex mt-3 mt-lg-0 w-100" style="max-width: 500px;" role="search">
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input class="form-control border-start-0 ps-0" id="input-buscador" type="search" placeholder="¿Qué estás buscando?">
          </div>
        </form>
      </div>
    </div>
  </nav>

  <div class="container mt-5">  
    <h1 class="text-center fw-bold mb-4">Tienda Libre</h1>
    <div id="productos-lista" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
  </div>

  <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow">
        <div class="modal-body p-0">
          <div class="card border-0">
            <div class="row g-0">
              <button type="button" class="btn-close position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal" aria-label="Close"></button>
              <div class="col-md-5 d-flex align-items-center justify-content-center bg-white p-4">
                <img id="modal-img" class="img-fluid rounded" style="max-height: 400px; object-fit: contain;">
              </div>
              <div class="col-md-7">
                <div class="card-body p-4 d-flex flex-column h-100">
                  <h3 class="card-title fw-bold" id="modal-title">Título</h3>
                  <hr>
                  <p class="card-text text-muted flex-grow-1" id="modal-description">Descripción...</p>
                  <div class="mt-4">
                    <h2 class="text-success fw-bold mb-3" id="modal-price"></h2>
                    <button class="btn btn-primary btn-lg w-100" id="btn-agregar-carrito">
                      <i class="bi bi-cart-plus me-2"></i> Agregar al carrito
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel" style="z-index: 1050;">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title fw-bold" id="cartOffcanvasLabel">Detalle de mi pedido</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
      <div id="cart-items-container">
        <p class="text-muted text-center mt-5">El carrito está vacío</p>
      </div>
      <div id="cart-totals" class="mt-auto" style="display: none;">
        <hr>
        <div class="d-flex justify-content-between mb-3 align-items-center">
          <strong class="fs-5">Total:</strong>
          <strong class="fs-4 text-primary" id="cart-total">$0.00</strong>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
    <div id="toastCarrito" class="toast align-items-center text-bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body">
          <i class="bi bi-check-circle-fill me-2"></i> <span id="toast-body">Producto agregado</span>
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
