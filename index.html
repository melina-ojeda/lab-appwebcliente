<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tienda Libre | Tu E-commerce</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <link rel="stylesheet" href="./style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">

  <header>
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm" style="z-index: 1030;">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">Inicio</a>

        <div class="d-flex align-items-center order-lg-last">
          <button class="btn btn-primary position-relative me-2" type="button" data-bs-toggle="offcanvas" 
                  data-bs-target="#cartOffcanvas" aria-controls="cartOffcanvas" aria-label="Ver carrito de compras">
            <i class="bi bi-cart3"></i>
            <span class="badge-floating" id="cart-badge">0</span>
          </button>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" 
                  aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Abrir menú de navegación">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link active" href="#">Productos</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
          </ul>
          
          <form class="d-flex mt-3 mt-lg-0 w-100" style="max-width: 500px;" role="search" id="form-buscador">
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-search text-muted"></i>
              </span>
              <input class="form-control border-start-0 ps-0" id="input-buscador" type="search" 
                     placeholder="¿Qué estás buscando?" aria-label="Buscar productos">
            </div>
          </form>
        </div>
      </div>
    </nav>
  </header>

  <main class="container mt-5">
    <section id="productos-seccion">
      <h1 class="text-center fw-bold mb-4">Tienda Libre</h1>
      <div id="productos-lista" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        </div>
    </section>
  </main>

  <footer class="bg-white text-center py-4 border-top mt-5">
    <div class="container">
      <p class="text-muted mb-0">© 2026 Laboratorio de Aplicaciones Web - Proyecto E-commerce</p>
      <small class="text-muted">Desarrollado por el Grupo 12</small>
    </div>
  </footer>

  <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow">
        <div class="modal-body p-0">
          <article class="card border-0">
            <div class="row g-0">
              <button type="button" class="btn-close position-absolute top-0 end-0 m-3 z-3" 
                      data-bs-dismiss="modal" aria-label="Cerrar detalle"></button>
              
              <div class="col-md-5 d-flex align-items-center justify-content-center bg-white p-4">
                <img id="modal-img" class="img-fluid rounded" style="max-height: 400px; object-fit: contain;" alt="Imagen del producto">
              </div>
              
              <div class="col-md-7">
                <div class="card-body p-4 d-flex flex-column h-100">
                  <h2 class="card-title fw-bold" id="modal-title">Título</h2>
                  <hr>
                  <p class="card-text text-muted flex-grow-1" id="modal-description">Descripción...</p>
                  <div class="mt-4">
                    <p class="fs-2 text-success fw-bold mb-3" id="modal-price">$0.00</p>
                    <button class="btn btn-primary btn-lg w-100" id="btn-agregar-carrito">
                      <i class="bi bi-cart-plus me-2"></i> Agregar al carrito
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </article>
        </div>
      </div>
    </div>
  </div>

  <aside class="offcanvas offcanvas-end shadow" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title fw-bold" id="cartOffcanvasLabel">Mi Pedido</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar carrito"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
      <div id="cart-items-container" class="flex-grow-1">
        <p class="text-muted text-center mt-5">Tu carrito está esperando ser llenado.</p>
      </div>
      
      <div id="cart-totals" class="mt-auto pt-3 border-top" style="display: none;">
        <div class="d-flex justify-content-between mb-3 align-items-center">
          <span class="fs-5 fw-bold">Total:</span>
          <span class="fs-4 text-primary fw-bold" id="cart-total">$0.00</span>
        </div>
        <div class="d-grid gap-2">
          <button class="btn btn-success" type="button" id="btn-checkout">
            <i class="bi bi-check-circle me-2"></i>Finalizar Compra
          </button>
          <button class="btn btn-outline-danger btn-sm" type="button" id="btn-clear-cart">
            <i class="bi bi-trash me-2"></i>Vaciar Carrito
          </button>
        </div>
      </div>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./src/app.js"></script>
</body>

</html>
