<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App web cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Inicio</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Productos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Ofertas</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                Categorías
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Tecnología</a></li>
                <li><a class="dropdown-item" href="#">Hogar</a></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item" href="#">Indumentaria</a></li>
              </ul>
            </li>
            <!--<li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Disabled</a>
        </li>>-->
          </ul>
          <form class="d-flex" role="search">
            <input class="form-control me-2" id="input-buscador" type="search" placeholder="Buscar un producto"
              aria-label="Search" />
            <button class="btn btn-outline-success" type="submit">Buscar</button>
          </form>
          <button class="btn btn-outline-info ms-2 d-flex align-items-center" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
            <div class="position-relative d-inline-block me-2">
            <i id="cart-icon" class="bi bi-cart3" style="font-size: 1.4rem;"></i>
            <span class="badge-floating" id="cart-badge">0</span>
            </div>
          <span class="d-none d-md-inline">Carrito</span>
        </button>
        </div>
      </div>
    </nav>

  <h1>Tienda Libre</h1>

  <!-- card producto-->
  <div class="container mt-4">
    <div id="productos-lista" class="row row-cols-1 row-cols-md-3 g-4"></div>
  </div>
  
  <!-- template de modal-->
  <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body p-0">
        <div class="card border-0">
          <div class="row g-0">
            <button type="button" class="btn-close position-absolute top-0 end-0 m-2" data-bs-dismiss="modal" aria-label="Close"></button>
            <div class="col-md-5 d-flex align-items-center justify-content-center p-3">
              <img id="modal-img" class="img-fluid" style="max-height: 300px; object-fit: contain;">
            </div>
            <div class="col-md-7">
              <div class="card-body d-flex flex-column h-100">
                <h5 class="card-title" id="modal-title">Título</h5>
                <p class="card-text flex-grow-1" id="modal-description">Descripción...</p>
                <h3 class="text-success fw-bold mb-3" id="modal-price"></h3>
                <button class="btn btn-primary w-100 mt-auto" id="btn-agregar-carrito">
                  <p> Agregar al carrito </p>
                </button>
              </div>
            </div>
          </div> </div> </div> </div>
  </div>
</div>

  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="cartOffcanvasLabel">Shopping Cart</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <div id="cart-items-container">
        <p class="text-muted">El carrito está vacío</p>
      </div>
      <div id="cart-totals" style="display: none;">
        <hr>
        <div class="d-flex justify-content-between mb-2">
          <strong>Total:</strong>
          <strong id="cart-total">$0.00</strong>
        </div>
      </div>
    </div>
  </div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">

  <div id="toastCarrito" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-body">
        Producto agregado
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./src/app.js"></script>
  <!-- el atributo módulo nos permite trabajar en base a funciones y que esas funciones se puedan importar/exportar en los distintos archivos js, lo que nos permite organizar mejor el código y reutilizarlo.-->

</body>


</html>
